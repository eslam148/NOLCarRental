services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nol-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=NOLCarRentalDB;User Id=sa;Password=${SA_PASSWORD:-YourStrong!Passw0rd};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;
      - Serilog__WriteTo__2__Args__serverUrl=http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    volumes:
      - api-logs:/app/logs
      - api-wwwroot:/app/wwwroot
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nol-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Express
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-YourStrong!Passw0rd}\" -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: nol-seq
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    restart: unless-stopped

volumes:
  sqlserver-data:
  seq-data:
  api-logs:
  api-wwwroot:
